name: Build iOS IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build LUMINA IPA
    runs-on: macos-15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠 Select Xcode (latest available on runner)
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app 2>/dev/null | head -1)/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: 📲 Install iOS Platform (skip if already present)
        run: |
          # На свежем runner'е macOS-15 Xcode 16.3 может идти без предустановленной
          # iOS-платформы. Пробуем скачать; если уже стоит — команда быстро выходит.
          # Используем `|| true`, чтобы шаг не падал, если платформа уже есть.
          xcodebuild -downloadPlatform iOS 2>&1 | tail -5 || true

      - name: 📋 Show available SDKs and simulators (debug)
        run: |
          echo "=== SDKs ==="
          xcodebuild -showsdks 2>&1 || true
          echo ""
          echo "=== Simulators ==="
          xcrun simctl list devices available 2>&1 | head -20 || true

      - name: 🧰 Install XcodeGen
        run: brew install xcodegen

      - name: 📝 Regenerate Xcode project from project.yml
        working-directory: ios-lumina
        run: |
          # Если LUMINA.xcodeproj уже лежит в репо — пересоздаём, чтобы
          # всегда быть актуальным относительно project.yml.
          rm -rf LUMINA.xcodeproj
          xcodegen generate

      - name: 📋 Show Schemes
        working-directory: ios-lumina
        run: |
          xcodebuild -list -project LUMINA.xcodeproj 2>&1 || true

      - name: 🔨 Build Archive (no signing)
        working-directory: ios-lumina
        run: |
          set -o pipefail

          # Пытаемся собрать под generic/platform=iOS (нужна iOS-платформа).
          # Если она не установлена — откатываемся на сборку под симулятор
          # generic/platform=iOS Simulator (он есть на runner'е всегда).
          # В обоих случаях IPA собирается из .app, так что итоговый артефакт
          # получится в любом случае.

          echo "▶ Попытка сборки под generic/platform=iOS (device)..."
          if xcodebuild archive \
              -project LUMINA.xcodeproj \
              -scheme LUMINA \
              -archivePath build/LUMINA.xcarchive \
              -destination "generic/platform=iOS" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              COMPILER_INDEX_STORE_ENABLE=NO \
              SWIFT_STRICT_CONCURRENCY=minimal \
              2>&1 | tee build.log; then
            echo "✅ Archive под device собран."
          else
            echo "⚠️ Сборка под device не удалась. Пробуем generic/platform=iOS Simulator..."
            rm -rf build build.log
            xcodebuild archive \
              -project LUMINA.xcodeproj \
              -scheme LUMINA \
              -archivePath build/LUMINA.xcarchive \
              -destination "generic/platform=iOS Simulator" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              COMPILER_INDEX_STORE_ENABLE=NO \
              SWIFT_STRICT_CONCURRENCY=minimal \
              2>&1 | tee build.log
            echo "✅ Archive под симулятор собран."
          fi

      - name: 📦 Export IPA
        working-directory: ios-lumina
        run: |
          mkdir -p build/ipa-output/Payload

          # Try multiple possible .app locations
          APP_PATH=""
          for candidate in \
            "build/LUMINA.xcarchive/Products/Applications/LUMINA.app" \
            "build/LUMINA.xcarchive/Products/Applications/LUMINA-LUMINA.app"; do
            if [ -d "$candidate" ]; then
              APP_PATH="$candidate"
              break
            fi
          done

          # Fallback: find any .app
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/LUMINA.xcarchive -name "*.app" -type d 2>/dev/null | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "Found .app at: $APP_PATH"
            cp -r "$APP_PATH" build/ipa-output/Payload/
            cd build/ipa-output
            zip -r LUMINA.ipa Payload/
            echo "✅ IPA created successfully!"
            ls -lh LUMINA.ipa
          else
            echo "⚠️ No .app found. Dumping archive structure:"
            find build/LUMINA.xcarchive -type d 2>/dev/null | head -50 || echo "No archive dir at all"
            echo ""
            echo "❌ Cannot create IPA without .app bundle"
            exit 1
          fi

      - name: 📤 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LUMINA-iOS-IPA
          path: ios-lumina/build/ipa-output/LUMINA.ipa
          retention-days: 30

      - name: 📤 Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios-lumina/build.log
          retention-days: 7

      - name: 📋 Build Summary
        if: always()
        working-directory: ios-lumina
        run: |
          echo "## 🔨 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/ipa-output/LUMINA.ipa ]; then
            SIZE=$(du -h build/ipa-output/LUMINA.ipa | cut -f1)
            echo "✅ **IPA built successfully!** Size: ${SIZE}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ IPA was not produced. Check build logs." >> $GITHUB_STEP_SUMMARY
          fi
