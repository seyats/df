name: LUMINA
options:
  bundleIdPrefix: app.lumina
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: ru

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  LUMINA:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LUMINA
        excludes:
          - "**/.DS_Store"
    resources:
      - LUMINA/Assets.xcassets
    info:
      path: LUMINA/Info.plist
      properties:
        CFBundleDisplayName: LUMINA
        CFBundleShortVersionString: "11.96"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: BackgroundMain
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: LUMINA использует камеру для фото- и видеозвонков.
        NSMicrophoneUsageDescription: LUMINA использует микрофон для аудио- и видеозвонков.
        NSPhotoLibraryUsageDescription: LUMINA нужна библиотека фото для отправки изображений.
        NSContactsUsageDescription: LUMINA использует контакты для поиска друзей.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lumina.LUMINA
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentBlue
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  LUMINATest:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - LUMINATest
    dependencies:
      - target: LUMINA
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lumina.LUMINATest
        GENERATE_INFOPLIST_FILE: YES

  LUMINAUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - LUMINAUITests
    dependencies:
      - target: LUMINA
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lumina.LUMINAUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LUMINA:
    build:
      targets:
        LUMINA: all
        LUMINATest: [test]
        LUMINAUITests: [test]
    test:
      targets:
        - LUMINATest
        - LUMINAUITests
    run:
      config: Debug
    archive:
      config: Release
